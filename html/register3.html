<!DOCTYPE html>
<html lang="de">
<head>
    <title>Login UI Prototype (HTML/CSS)</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ui prototype template for login and register process">
    <meta name="author" content="Katharina Erfling">
    
    <link rel="stylesheet" href="../css/stylesheet.css">
</head>
<body>
    <main>
        <form action="#">
            <ul>
                <li>
                    <label for="info">Wie hast du von uns erfahren?</label>
                    <select name="select" id="info">
                        <option value="friends" selected>Freunde</option>
                        <option value="radio">Radio</option>
                        <option value="printed_ad">Printwerbung</option>
                        <option value="tv_ad">TV Werbung</option>
                        <option value="internet">Internet</option>
                    </select>
                </li>

                <li class="checkbox-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Ich stimme den allgemeinen Geschäftsbedingungen zu*</label>
                </li>

                <!-- FIX: input[type="image"] ersetzt durch button -->
                <li>
                    <button class="w-100p btn primary" type="submit" onclick="alert('Danke fürs Registrieren! Bitte bestätige deine E-Mail')">
                        Registrierung abschließen
                    </button>
                </li>

                <li><a href="register2.html">Zurück</a></li>

                <!-- FIX: <progress> statt <meter> -->
                <li>
                    <progress class="form-progress" value="100" max="100"></progress>
                </li>
            </ul>
        </form>
    </main>
</body>
</html>
