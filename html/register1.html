<!DOCTYPE html>
<html lang="de">
<head>
    <title>Login UI Prototype (HTML/CSS)</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ui prototype template for login and register process">
    <meta name="author" content="Katharina Erfling">
    
    <link rel="stylesheet" href="../css/stylesheet.css">
</head>
<body>
    <main>
        <h1>Registrieren</h1>
        <form>
            <ul>
                <li><label for="name">Username*</label></li>
                <li><input class="w-100p" type="text" id="name" name="username" placeholder="Dein Username" required autocomplete="username"></li>

                <li><label for="password">Passwort*</label></li>
                <!-- FIX: minlength="8", title für Hinweistext -->
                <li><input class="w-100p" type="password" id="password" name="passw" placeholder="Dein Passwort" required minlength="8" title="Mindestens 8 Zeichen" autocomplete="new-password"></li>

                <li><label for="birthday">Geburtstag*</label></li>
                <li><input class="w-100p" type="date" id="birthday" name="birthday" required></li>

                <li><label for="favcolor">Lieblingsfarbe</label></li>
                <li><input type="color" id="favcolor" name="fcolor"></li>

                <!-- FIX: <br> aus <ul> entfernt, Abstand per CSS -->
                <li class="form-actions">
                    <a href="register2.html" class="btn primary btn-link">Weiter</a>
                    <a href="../index.html">Zurück</a>
                </li>

                <!-- FIX: <progress> statt <meter> für Fortschrittsanzeige -->
                <li>
                    <progress class="form-progress" value="30" max="100"></progress>
                </li>
            </ul>
        </form>
    </main>

        <!-- aside START -->
    <aside>
        <div>
            <a href="../../index.html">
                <img src="../images/mail-svgrepo-com.svg" alt="Kontakt per Mail" height="40">
            </a>
        </div>
        <div>
            <a href="#">
                <img src="../images/question-mark-svgrepo-com.svg" alt="Hilfe & FAQ" height="40">
            </a>
        </div>
    </aside>
    <!-- aside END -->

    
</body>
</html>
