<!DOCTYPE html>
<html lang="de">
<head>
    <title>Login UI Prototype (HTML/CSS)</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ui prototype template for login and register process">
    <meta name="author" content="Katharina Erfling">
    
    <link rel="stylesheet" href="css/stylesheet.css">
    
</head>
<body>
    <main>
        <h1>Login</h1>
        <form action="#">
            <ul>
                <li><label for="name">Username*</label></li>
                <li>
                    <input class="w-100p" type="text" id="name" name="username" placeholder="Dein Username" required autofocus autocomplete="username">
                </li>
                <li><label for="password">Passwort*</label></li>
                <li>
                    <!-- FIX: minlength muss eine Zahl sein, kein String -->
                    <input class="w-100p" type="password" id="password" name="passw" placeholder="Dein Passwort" required minlength="8" title="Mindestens 8 Zeichen" autocomplete="current-password">
                </li>
                <li>
                    <input type="checkbox" id="rememberme" name="rememb">
                    <label for="rememberme">Login speichern</label>
                </li>
                <li>
                    <input class="w-100p btn primary" type="submit" value="Einloggen">
                    <!-- FIX: Zurücksetzen ist type="reset", nicht type="submit" -->
                    <input class="w-100p btn secondary" type="reset" value="Zurücksetzen">
                </li>
                <li>
                    <a href="html/forgotpassword.html">Passwort vergessen?</a>
                    <a href="html/register1.html">Registrieren</a>
                </li>
            </ul>
        </form>
    </main>

    <!-- aside START -->
    <aside>
        <div>
            <a href="../../index.html">
                <img src="images/mail-svgrepo-com.svg" alt="Kontakt per Mail" height="40">
            </a>
        </div>
        <div>
            <a href="#">
                <img src="images/question-mark-svgrepo-com.svg" alt="Hilfe & FAQ" height="40">
            </a>
        </div>
    </aside>
    <!-- aside END -->

</body>
</html>
